document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

=\"display:flex;background:#E7E8ED;border-radius:12px;padding:3px;gap:2px;\">\n              <button onclick=\"{{ setTypeIncome }}\" style=\"{{ segIncomeStyle }}\">Gelir<\u002Fbutton>\n              <button onclick=\"{{ setTypeExpense }}\" style=\"{{ segExpenseStyle }}\">Gider<\u002Fbutton>\n            <\u002Fdiv>\n            <button onclick=\"{{ closeSheet }}\" style=\"width:34px;height:34px;border-radius:17px;border:none;background:#E7E8ED;color:#6B7280;font-size:16px;font-weight:700;cursor:pointer;\">✕<\u002Fbutton>\n          <\u002Fdiv>\n\n          <!-- amount display -->\n          <div style=\"text-align:center;padding:18px 20px 8px;\">\n            <div style=\"font-size:13px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:#9AA0AA;\">Tutar<\u002Fdiv>\n            <div style=\"font-size:56px;font-weight:800;letter-spacing:-1.5px;margin-top:2px;color:{{ sheetAccent }};font-variant-numeric:tabular-nums;line-height:1.05;\">{{ curSym }}{{ amountDisplay }}<\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- category chips -->\n          <div style=\"padding:4px 0 2px;\">\n            <div style=\"display:flex;gap:8px;overflow-x:auto;padding:4px 20px 8px;\">\n              <sc-for list=\"{{ sheetCats }}\" as=\"c\" hint-placeholder-count=\"4\">\n                <button onclick=\"{{ c.onTap }}\" style=\"{{ c.style }}\">{{ c.name }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- payment segment -->\n          <div style=\"padding:4px 20px 6px;\">\n            <div style=\"display:flex;background:#E7E8ED;border-radius:13px;padding:3px;gap:2px;\">\n              <sc-for list=\"{{ paySegs }}\" as=\"p\" hint-placeholder-count=\"3\">\n                <button onclick=\"{{ p.onTap }}\" style=\"{{ p.style }}\">{{ p.label }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- keypad -->\n          <div style=\"padding:6px 16px 4px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;\">\n            <sc-for list=\"{{ keys }}\" as=\"k\" hint-placeholder-count=\"12\">\n              <button onclick=\"{{ k.onTap }}\" style=\"height:56px;border:none;border-radius:16px;background:#fff;color:#0B1220;font-size:26px;font-weight:600;cursor:pointer;box-shadow:0 1px 2px rgba(20,28,48,.06);display:flex;align-items:center;justify-content:center;\">{{ k.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <!-- save buttons -->\n          <div style=\"padding:8px 16px;display:flex;gap:10px;\">\n            <button onclick=\"{{ saveContinue }}\" style=\"{{ continueStyle }}\">Ekle ve devam<\u002Fbutton>\n            <button onclick=\"{{ saveClose }}\" style=\"{{ saveStyle }}\">Kaydet<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"height:14px;flex:0 0 auto;\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:468,&quot;height&quot;:984},&quot;currencySymbol&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;฿&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;İçerik&quot;},&quot;partnerAName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Burak&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Ortaklık&quot;},&quot;partnerBName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Ramazan&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Ortaklık&quot;},&quot;partnerAPct&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:90,&quot;min&quot;:0,&quot;max&quot;:100,&quot;step&quot;:5,&quot;unit&quot;:&quot;%&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Ortaklık&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    tab: 'gun',\n    sheetOpen: false,\n    sheetType: 'income',\n    amount: '',\n    category: 'Kiralama',\n    payment: 'Nakit',\n    toast: null,\n    fleetTotal: 24,\n    fleetRented: 18,\n    fleetBroken: 2,\n    txns: [\n      { id: 1, type: 'income', cat: 'Kiralama', pay: 'Nakit', amt: 3200, note: '12 bisiklet · yarım gün' },\n      { id: 2, type: 'income', cat: 'Kiralama', pay: 'Kart', amt: 1850, note: '' },\n      { id: 3, type: 'income', cat: 'Depozito', pay: 'Nakit', amt: 500, note: '2 müşteri' },\n      { id: 4, type: 'expense', cat: 'Yakıt', pay: 'Nakit', amt: 420, note: 'Servis aracı' },\n      { id: 5, type: 'expense', cat: 'Tamir', pay: 'Nakit', amt: 650, note: 'Fren + zincir' },\n      { id: 6, type: 'expense', cat: 'Yemek', pay: 'Kart', amt: 180, note: '' },\n    ],\n  };\n\n  PREV = 12400;\n  INCOME_CATS = ['Kiralama', 'Depozito', 'Satış', 'Diğer'];\n  EXPENSE_CATS = ['Yakıt', 'Tamir', 'Yemek', 'Maaş', 'Kira', 'Malzeme', 'Diğer'];\n  PAYMENTS = ['Nakit', 'Kart', 'Havale'];\n\n  cur() { return this.props.currencySymbol ?? '฿'; }\n  num(n) { return Math.round(n).toLocaleString('en-US'); }\n  fmt(n) { return this.cur() + this.num(n); }\n  fmtSigned(n) { return (n < 0 ? '−' : '+') + this.cur() + this.num(Math.abs(n)); }\n\n  // ---- keypad ----\n  handleKey(k) {\n    this.setState(s => {\n      let a = s.amount;\n      if (k === 'del') { a = a.slice(0, -1); }\n      else if (k === '.') { if (!a.includes('.')) a = (a === '' ? '0' : a) + '.'; }\n      else {\n        if (a.includes('.')) { const dec = a.split('.')[1]; if (dec.length >= 2) return null; }\n        if (a === '0') a = k; else a = a + k;\n        if (a.replace('.', '').length > 9) return null;\n      }\n      return { amount: a };\n    });\n  }\n  amountNum() { return parseFloat(this.state.amount || '0') || 0; }\n  displayAmount() {\n    const a = this.state.amount;\n    if (a === '' || a === '0') return '0';\n    const parts = a.split('.');\n    const gi = Number(parts[0] || 0).toLocaleString('en-US');\n    return parts.length > 1 ? gi + '.' + parts[1] : gi;\n  }\n\n  openSheet(type) {\n    const cats = type === 'income' ? this.INCOME_CATS : this.EXPENSE_CATS;\n    this.setState({ sheetOpen: true, sheetType: type, amount: '', category: cats[0] });\n  }\n  setType(type) {\n    const cats = type === 'income' ? this.INCOME_CATS : this.EXPENSE_CATS;\n    this.setState(s => ({ sheetType: type, category: cats.includes(s.category) ? s.category : cats[0] }));\n  }\n  showToast(msg, color) {\n    this.setState({ toast: msg, toastColor: color });\n    clearTimeout(this._tt);\n    this._tt = setTimeout(() => this.setState({ toast: null }), 1900);\n  }\n  doSave(keepOpen) {\n    const n = this.amountNum();\n    if (n <= 0 || !this.state.category) return;\n    const t = this.state.sheetType;\n    const txn = { id: Date.now(), type: t, cat: this.state.category, pay: this.state.payment, amt: n, note: '' };\n    this.setState(s => ({ txns: [txn, ...s.txns], amount: '', sheetOpen: keepOpen ? true : false }));\n    this.showToast((t === 'income' ? 'Gelir' : 'Gider') + ' eklendi · ' + this.fmt(n), t === 'income' ? '#34C77A' : '#F2565B');\n  }\n\n  // ---- derived ----\n  derive() {\n    const inc = this.state.txns.filter(t => t.type === 'income');\n    const exp = this.state.txns.filter(t => t.type === 'expense');\n    const incomeTotal = inc.reduce((a, t) => a + t.amt, 0);\n    const expenseTotal = exp.reduce((a, t) => a + t.amt, 0);\n    const cardIncome = inc.filter(t => t.pay === 'Kart').reduce((a, t) => a + t.amt, 0);\n    const posFee = cardIncome * 0.035;\n    const dayNet = incomeTotal - expenseTotal - posFee;\n    const closing = this.PREV + dayNet;\n    return { inc, exp, incomeTotal, expenseTotal, posFee, dayNet, closing };\n  }\n\n  chipStyle(sel, accent) {\n    const base = 'padding:9px 15px;border-radius:13px;font-size:14.5px;font-weight:600;white-space:nowrap;cursor:pointer;border:1.5px solid;flex:0 0 auto;';\n    return base + (sel ? `background:${accent};color:#fff;border-color:${accent};` : 'background:#fff;color:#3A3A3C;border-color:#E5E5EA;');\n  }\n  segStyle(sel) {\n    const base = 'flex:1;text-align:center;padding:8px 4px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none;';\n    return base + (sel ? 'background:#fff;color:#0B1220;box-shadow:0 1px 3px rgba(11,18,32,.14);' : 'background:transparent;color:#8A8A8E;');\n  }\n  typeSegStyle(sel, accent) {\n    const base = 'padding:8px 22px;border-radius:9px;font-size:15px;font-weight:700;cursor:pointer;border:none;';\n    return base + (sel ? `background:#fff;color:${accent};box-shadow:0 1px 3px rgba(11,18,32,.14);` : 'background:transparent;color:#8A8A8E;');\n  }\n\n  renderVals() {\n    const d = this.derive();\n    const accent = this.state.sheetType === 'income' ? '#1F9E5A' : '#D2363B';\n    const meta = t => {\n      const parts = [t.pay];\n      if (t.note) parts.push(t.note);\n      return parts.join(' · ');\n    };\n    const incomeLines = d.inc.map(t => ({ key: t.id, cat: t.cat, meta: meta(t), amtStr: this.fmt(t.amt) }));\n    const expenseLines = d.exp.map(t => ({ key: t.id, cat: t.cat, meta: meta(t), amtStr: this.fmt(t.amt) }));\n\n    // fleet\n    const idle = Math.max(0, this.state.fleetTotal - this.state.fleetRented - this.state.fleetBroken);\n    const denom = Math.max(1, this.state.fleetTotal - this.state.fleetBroken);\n    const pct = Math.round((this.state.fleetRented / denom) * 100);\n    const C1 = 2 * Math.PI * 24, C2 = 2 * Math.PI * 62;\n    const clamp = Math.min(100, pct) / 100;\n\n    // month seed\n    const rawMonth = [\n      { day: '1', dow: 'Salı', net: 3208, cum: 15608 },\n      { day: '2', dow: 'Çarşamba', net: 2940, cum: 18548 },\n      { day: '3', dow: 'Perşembe', net: -540, cum: 18008 },\n      { day: '4', dow: 'Cuma', net: 4120, cum: 22128 },\n      { day: '5', dow: 'Cumartesi', net: 5380, cum: 27508 },\n      { day: '6', dow: 'Pazar', net: 3900, cum: 31408 },\n      { day: '7', dow: 'Pazartesi', net: 2180, cum: 33588 },\n    ];\n    const monthRows = rawMonth.map(r => ({\n      day: r.day, dow: r.dow,\n      netStr: this.fmtSigned(r.net), netColor: r.net < 0 ? '#D2363B' : '#1F9E5A',\n      cumStr: this.fmt(r.cum),\n      onClick: () => this.setState({ tab: 'rapor' }),\n    }));\n    const monthFinal = 48300;\n    const pA = this.props.partnerAPct ?? 70;\n    const pB = 100 - pA;\n\n    const rawExpCat = [\n      { name: 'Maaş', amt: 12000 }, { name: 'Kira', amt: 8000 },\n      { name: 'Tamir', amt: 6800 }, { name: 'Yakıt', amt: 4200 }, { name: 'Malzeme', amt: 2400 },\n    ];\n    const maxCat = Math.max(...rawExpCat.map(c => c.amt));\n    const expenseCatDist = rawExpCat.map(c => ({ name: c.name, amtStr: this.fmt(c.amt), pct: Math.round(c.amt / maxCat * 100) + '%' }));\n\n    const rawIncCat = [\n      { name: 'Kiralama', amt: 62400 }, { name: 'Depozito', amt: 6500 },\n      { name: 'Satış', amt: 3200 }, { name: 'Diğer', amt: 2100 },\n    ];\n    const maxIncCat = Math.max(...rawIncCat.map(c => c.amt));\n    const incomeCatDist = rawIncCat.map(c => ({ name: c.name, amtStr: this.fmt(c.amt), pct: Math.round(c.amt / maxIncCat * 100) + '%' }));\n\n    return {\n      // nav\n      isGun: this.state.tab === 'gun', isAy: this.state.tab === 'ay',\n      isRapor: this.state.tab === 'rapor', isFilo: this.state.tab === 'filo',\n      cGun: this.state.tab === 'gun' ? '#1F3864' : '#9AA0AA',\n      cAy: this.state.tab === 'ay' ? '#1F3864' : '#9AA0AA',\n      cRapor: this.state.tab === 'rapor' ? '#1F3864' : '#9AA0AA',\n      cFilo: this.state.tab === 'filo' ? '#1F3864' : '#9AA0AA',\n      tabGun: () => this.setState({ tab: 'gun' }),\n      tabAy: () => this.setState({ tab: 'ay' }),\n      tabRapor: () => this.setState({ tab: 'rapor' }),\n      tabFilo: () => this.setState({ tab: 'filo' }),\n      goFilo: () => this.setState({ tab: 'filo' }),\n      noop: () => {},\n\n      todayLong: '2 Temmuz, Çarşamba',\n\n      // hero\n      closingStr: this.fmt(d.closing),\n      incomeStr: this.fmt(d.incomeTotal),\n      expenseStr: this.fmt(d.expenseTotal),\n      posStr: this.fmt(d.posFee),\n      prevStr: this.fmt(this.PREV),\n      dayNetStr: this.fmtSigned(d.dayNet),\n      dayNetColor: d.dayNet < 0 ? '#F2565B' : '#7DE0A6',\n      dayNetColor2: d.dayNet < 0 ? '#D2363B' : '#1F9E5A',\n\n      // lists\n      incomeLines, expenseLines,\n      hasIncome: incomeLines.length > 0, noIncome: incomeLines.length === 0,\n      hasExpense: expenseLines.length > 0, noExpense: expenseLines.length === 0,\n\n      // fleet\n      fleetTotal: this.state.fleetTotal, fleetRented: this.state.fleetRented,\n      fleetBroken: this.state.fleetBroken, fleetIdle: idle,\n      rentalPct: '%' + pct,\n      ringDash: (clamp * C1).toFixed(1) + ' ' + C1.toFixed(1),\n      ringDashBig: (clamp * C2).toFixed(1) + ' ' + C2.toFixed(1),\n      incTotal: () => this.setState(s => ({ fleetTotal: s.fleetTotal + 1 })),\n      decTotal: () => this.setState(s => ({ fleetTotal: Math.max(s.fleetRented + s.fleetBroken, s.fleetTotal - 1) })),\n      incRented: () => this.setState(s => ({ fleetRented: Math.min(s.fleetTotal - s.fleetBroken, s.fleetRented + 1) })),\n      decRented: () => this.setState(s => ({ fleetRented: Math.max(0, s.fleetRented - 1) })),\n      incBroken: () => this.setState(s => ({ fleetBroken: Math.min(s.fleetTotal - s.fleetRented, s.fleetBroken + 1) })),\n      decBroken: () => this.setState(s => ({ fleetBroken: Math.max(0, s.fleetBroken - 1) })),\n      saveFleet: () => this.showToast('Filo durumu kaydedildi', '#34C77A'),\n\n      // month\n      monthFinalStr: this.fmt(monthFinal),\n      monthIncomeStr: this.fmt(74200), monthExpenseStr: this.fmt(33400),\n      partnerAName: this.props.partnerAName ?? 'Burak', partnerAPct: pA,\n      partnerBName: this.props.partnerBName ?? 'Mehmet', partnerBPct: pB,\n      partnerAStr: this.fmt(Math.round(monthFinal * pA / 100)),\n      partnerBStr: this.fmt(Math.round(monthFinal * pB / 100)),\n      monthRows, expenseCatDist, incomeCatDist,\n      downloadMonth: () => this.showToast('Ay raporu indiriliyor…', '#7DA9F2'),\n\n      // toast\n      toast: this.state.toast, toastColor: this.state.toastColor,\n\n      // sheet\n      sheetOpen: this.state.sheetOpen,\n      curSym: this.cur(),\n      amountDisplay: this.displayAmount(),\n      sheetAccent: accent,\n      openIncome: () => this.openSheet('income'),\n      openExpense: () => this.openSheet('expense'),\n      closeSheet: () => this.setState({ sheetOpen: false }),\n      setTypeIncome: () => this.setType('income'),\n      setTypeExpense: () => this.setType('expense'),\n      segIncomeStyle: this.typeSegStyle(this.state.sheetType === 'income', '#1F9E5A'),\n      segExpenseStyle: this.typeSegStyle(this.state.sheetType === 'expense', '#D2363B'),\n      sheetCats: (this.state.sheetType === 'income' ? this.INCOME_CATS : this.EXPENSE_CATS).map(c => ({\n        name: c, style: this.chipStyle(this.state.category === c, accent), onTap: () => this.setState({ category: c }),\n      })),\n      paySegs: this.PAYMENTS.map(p => ({\n        label: p, style: this.segStyle(this.state.payment === p), onTap: () => this.setState({ payment: p }),\n      })),\n      keys: ['1', '2', '3', '4', '5', '6', '7', '8', '9', '.', '0', 'del'].map(k => ({\n        label: k === 'del' ? '⌫' : k, onTap: () => this.handleKey(k),\n      })),\n      saveClose: () => this.doSave(false),\n      saveContinue: () => this.doSave(true),\n      saveStyle: 'flex:1.4;padding:15px;border:none;border-radius:15px;font-size:16px;font-weight:700;cursor:pointer;color:#fff;background:' + accent + ';box-shadow:0 10px 20px -12px ' + accent + ';',\n      continueStyle: 'flex:1;padding:15px;border:none;border-radius:15px;font-size:15px;font-weight:600;cursor:pointer;color:' + accent + ';background:#fff;box-shadow:0 1px 4px rgba(20,28,48,.08);',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
