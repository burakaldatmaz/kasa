# kasa.bkkbike.com — mevcut nginx düzenine eklenecek server block.
# Cookie "Secure" işaretli olduğundan HTTPS zorunludur; 80 yalnız yönlendirir.
#
# Sertifika (mevcut certbot düzenine ekleme):
#   sudo certbot --nginx -d kasa.bkkbike.com
# certbot --nginx ssl_certificate satırlarını kendisi yazar ve yenilemeyi mevcut
# systemd timer'ı (certbot.timer) üzerinden otomatik yapar. Elle certonly tercihte:
#   sudo certbot certonly --nginx -d kasa.bkkbike.com

server {
    listen 80;
    listen [::]:80;
    server_name kasa.bkkbike.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name kasa.bkkbike.com;

    # certbot --nginx bu iki satırı kendi yolu ile doldurur:
    ssl_certificate     /etc/letsencrypt/live/kasa.bkkbike.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kasa.bkkbike.com/privkey.pem;

    # HSTS: yalnız HTTPS'ten servis edildiği için güvenli (6 ay).
    add_header Strict-Transport-Security "max-age=15768000" always;

    # PDF/Excel indirmeleri için makul gövde/zaman sınırları
    client_max_body_size 1m;
    proxy_read_timeout 60s;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # API'de websocket yok; Connection başlığını temiz tut.
        proxy_set_header Connection "";
    }
}
